</head>


<body>

<main>


<h1>
⚙️ פאנל מנהלים
</h1>



<div class="admin-card">


<h2>
📅 יצירת אירוע חדש
</h2>




<input 
id="title"
type="text"
placeholder="שם האירוע">



<br><br>



<input 
id="date"
type="date">



<br><br>



<input 
id="time"
type="time">



<br><br>



<input 
id="location"
type="text"
placeholder="מקום האירוע">



<br><br>



<input 
id="prize"
type="text"
placeholder="פרס (לא חובה)">



<br><br>



<textarea

id="description"

placeholder="תיאור האירוע">

</textarea>



<br><br>



<button onclick="sendEvent()">

📅 פרסם אירוע

</button>

<div class="admin-card">

    <h2>🗑️ מחיקת אירועים</h2>

    <div id="admin-events"></div>

</div>

<div class="admin-card">

<h2>📢 פרסום עדכון חדש</h2>


<input
id="updateTitle"
type="text"
placeholder="כותרת העדכון">


<br><br>


<textarea
id="updateMessage"
rows="6"
placeholder="תוכן העדכון">
</textarea>


<br><br>


<button onclick="sendUpdate()">

📢 פרסם עדכון

</button>


</div>




<div class="admin-card">

<h2>🗑️ מחיקת עדכונים</h2>


<div id="admin-updates"></div>


</div>


</main>



<script>

async function checkAdmin(){


    const response = await fetch("/api/check-admin", {
    })


    const data = await response.json();



    if(!data.admin){


        alert("❌ אין לך הרשאה להיכנס לפאנל");


        window.location.href = "login.html";


    }


}



checkAdmin();

async function sendEvent(){
   
    console.log("הכפתור עובד");

    const event = {


        title:
        document.getElementById("title").value,


        date:
        document.getElementById("date").value,


        time:
        document.getElementById("time").value,


        location:
        document.getElementById("location").value,


        prize:
        document.getElementById("prize").value,


        description:
        document.getElementById("description").value


    };



const response = await fetch("/api/events", {
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body:JSON.stringify(event)
});


        body:JSON.stringify(event)


  



    const data = await response.json();



    if(data.success){


        alert("✅ האירוע פורסם!");

    }


    else{


        alert("❌ הייתה שגיאה");


    }


}

async function loadAdminEvents(){

    const response = await fetch("/api/events");

    const events = await response.json();


    const box = document.getElementById("admin-events");


    box.innerHTML = "";


    events.forEach(event => {


        box.innerHTML += `

        <div class="event-card">

            <h3>
            🎉 ${event.title}
            </h3>

            <p>
            📅 ${event.date}
            </p>


            <button onclick="deleteEvent(${event.id})">
            🗑️ מחק אירוע
            </button>

        </div>

        `;


    });


}



async function deleteEvent(id){


    const answer = confirm("למחוק את האירוע?");


    if(!answer) return;



    await fetch(`/api/events/${id}`, {
    method: "DELETE"
});

    alert("האירוע נמחק");


    loadAdminEvents();


}



loadAdminEvents();

async function sendUpdate(){


    const update = {


        title:
        document.getElementById("updateTitle").value,


        message:
        document.getElementById("updateMessage").value


    };



const response = await fetch("/api/updates", {
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body:JSON.stringify(update)
});


        body:JSON.stringify(update)





    const data = await response.json();



    if(data.success){


        alert("📢 העדכון פורסם!");


        document.getElementById("updateTitle").value = "";

        document.getElementById("updateMessage").value = "";


        loadAdminUpdates();


    }



}



async function loadAdminUpdates(){


    const response = await fetch("/api/updates");


    const updates = await response.json();



    const box = document.getElementById("admin-updates");



    box.innerHTML = "";



    updates.forEach(update=>{


        box.innerHTML += `


        <div class="event-card">


            <h3>
            📢 ${update.title}
            </h3>


            <p>
            ${update.message}
            </p>


            <button onclick="deleteUpdate(${update.id})">

            🗑️ מחק עדכון

            </button>


        </div>


        `;


    });



}



async function deleteUpdate(id){


    const answer = confirm("למחוק את העדכון?");


    if(!answer) return;



await fetch(`/api/updates/${id}`, {
    method: "DELETE"
});



    alert("העדכון נמחק");


    loadAdminUpdates();


}



loadAdminUpdates();

</script>



</body>

</html>
